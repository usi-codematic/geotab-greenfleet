version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=greenfleet2026
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      # Geotab credentials (set these before running)
      - GEOTAB_DATABASE=${GEOTAB_DATABASE}
      - GEOTAB_USERNAME=${GEOTAB_USERNAME}
      - GEOTAB_PASSWORD=${GEOTAB_PASSWORD}
      - GEOTAB_SERVER=${GEOTAB_SERVER:-my.geotab.com}
      # Notification webhooks
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
